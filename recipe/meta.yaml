{% set name = "pointpats" %}
{% set version = "2.5.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 6be0be63c893b542d4b6b00609bb8378c38b58245c1cc53a95283500c3d4a663

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vvv
  skip: true  # [py<310]

requirements:
  host:
    - python
    - pip
    - setuptools >=61.0
    - setuptools_scm >=6.2
  run:
    - python
    - libpysal >=4.8
    - geopandas >=0.12
    - matplotlib-base >=3.6
    - numpy >=1.24
    - pandas >=1.4,!=1.5.0
    - scipy >=1.10
    - shapely >=2

test:
  source_files:
    # tests have relative imports
    - pointpats
  imports:
    - pointpats
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - pytest -vv pointpats/tests
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"

about:
  home: https://pysal.org
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Statistical analysis of planar point patterns.
  description: |
    This pointpats package is intended to support the statistical analysis
    of planar point patterns.
  doc_url: https://pysal.org/pointpats
  dev_url: https://github.com/pysal/pointpats

extra:
  recipe-maintainers:
    - weikang9009
    - slumnitz
