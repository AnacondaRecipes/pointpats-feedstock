{% set name = "pointpats" %}
{% set version = "2.5.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 5af6ad0b689905f59037a6a7e4ba99ab4aafe8e088894032902c3e7f9c7e72b5

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vvv
  skip: true  # [py<311]

requirements:
  host:
    - python
    - pip
    - setuptools >=61.0
    - setuptools_scm >=6.2
  run:
    - python
    - libpysal >=4.10
    - geopandas >=1.0
    - matplotlib-base >=3.9
    - numpy >=1.26
    - pandas >=2.2
    - scipy >=1.12
    - shapely >=2.1

test:
  source_files:
    # tests have relative imports
    - pointpats
  imports:
    - pointpats
    - pointpats.quadrat_statistics
    - pointpats.random
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -ra -vv pointpats/tests

about:
  home: https://pysal.org
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Statistical analysis of planar point patterns.
  description: |
    This pointpats package is intended to support the statistical analysis
    of planar point patterns.
  doc_url: https://pysal.org/pointpats
  dev_url: https://github.com/pysal/pointpats

extra:
  recipe-maintainers:
    - weikang9009
    - slumnitz
